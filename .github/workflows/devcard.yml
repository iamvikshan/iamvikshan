name: daily-devcard
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  devcard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: devcard
        uses: dailydotdev/action-devcard@958db5a3e058fa60678968743b17214f7fc03a4b # 3.2.1
        with:
          user_id: ${{ secrets.USER_ID }}
          commit_filename: assets/devcard.png
          commit_message: "chore: update ${filename}"
          type: wide
          committer_name: ${{ github.actor }}
          committer_email: ${{ github.actor }}@users.noreply.github.com
