name: Sync to GitLab
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed, reopened]
  issues:
    types: [opened, closed, reopened]
  release:
    types: [published]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Sync with GitLab
        uses: iamvikshan/gitsync@b401ec3ed982e44a4c0757f0e75afd1b300e44fd # v1.1.0
        with:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GH_PAT: ${{ secrets.GH_TOKEN }}
