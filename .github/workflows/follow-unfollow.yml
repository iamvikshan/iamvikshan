name: Github-Auto-Follow-Unfollow-View-User-List

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * 1-5"

jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - name: Github-Auto-Follow-Unfollow-View-User-List
        uses: Huniko519/Github-Auto-Follow-Unfollow-View-User-List@da8b5b1fe0df7e801ef1ecc3fc63d5a1d1c78e7f # main
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ github.repository }}
          isReadmeUpdate: false
